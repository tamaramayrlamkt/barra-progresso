<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barra de Progresso</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
}

.progress{
    width:100%;
    height:44px;
    background:#E5E5E5;
    border-radius:8px;
    overflow:hidden;
}

.progress-fill{
    width:0%;
    height:100%;
    background:#0057B8;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    font-size:15px;
    font-weight:600;
    transition:width 1.2s ease;
}
</style>

</head>
<body>

<div class="progress">
    <div class="progress-fill" id="barra">
        <span>Andamento da Obra</span>
        <span id="valor"></span>
    </div>
</div>

<script>

/* ======================================
   ALTERE APENAS ESTA LINHA
   ====================================== */

const percentual = 73;

/* ====================================== */

document.getElementById("valor").textContent = percentual + "%";

window.onload = () => {
    setTimeout(() => {
        document.getElementById("barra").style.width = percentual + "%";
    }, 200);
};

</script>

</body>
</html>
